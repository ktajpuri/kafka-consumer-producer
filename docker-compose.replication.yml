# docker-compose.replication.yml
# ---------------------------------------------------------------------------
# 3-broker KRaft cluster (combined mode) — REPLICATION DEMO ONLY.
# Separate from your single-broker harness on purpose: docker-compose.yml
# and its five experiments stay untouched.
#
#   Start:  docker compose -f docker-compose.replication.yml up -d
#   Stop a broker (keeps its data):  docker compose -f docker-compose.replication.yml stop kafka-2
#   Bring it back:                   docker compose -f docker-compose.replication.yml start kafka-2
#   Full teardown (wipes data):      docker compose -f docker-compose.replication.yml down -v
#
# Listener scheme = same names as your single-broker file:
#   PLAINTEXT      (9092): inter-broker + kafka-ui traffic, inside the compose network
#   CONTROLLER     (9093): KRaft quorum, never touched by clients
#   PLAINTEXT_HOST (9094 in-container): host scripts, mapped to a UNIQUE host port per broker
#
# Host ports:  kafka-1 -> 9094, kafka-2 -> 9095, kafka-3 -> 9096
# Host scripts must bootstrap against all three:
#   localhost:9094,localhost:9095,localhost:9096
#
# No named volumes on purpose: `stop`/`start` reuses the same container (data
# survives, so a restarted broker re-joins and its ISR re-expands). Only
# `down -v` wipes. Because there are no pre-formatted volumes, the cluster
# forms on a shared default cluster-id — no CLUSTER_ID pinning needed here.
# (If you later add per-broker volumes, you MUST pin the same CLUSTER_ID on
# all three or they won't form a quorum.)
# ---------------------------------------------------------------------------

name: kafka-replication-demo

x-broker-common: &broker-common
  image: apache/kafka:latest
  environment: &broker-env
    KAFKA_PROCESS_ROLES: broker,controller
    KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
    KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:9094
    KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
    KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
    KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
    # 3 brokers now exist, so internal topics can (and should) replicate:
    KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
    KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
    KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
    KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

services:
  kafka-1:
    <<: *broker-common
    container_name: kafka-1
    ports:
      - "9094:9094"
    environment:
      <<: *broker-env
      KAFKA_NODE_ID: 1
      # advertised host address must match the UNIQUE host port mapped above:
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:9092,PLAINTEXT_HOST://localhost:9094

  kafka-2:
    <<: *broker-common
    container_name: kafka-2
    ports:
      - "9095:9094"
    environment:
      <<: *broker-env
      KAFKA_NODE_ID: 2
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-2:9092,PLAINTEXT_HOST://localhost:9095

  kafka-3:
    <<: *broker-common
    container_name: kafka-3
    ports:
      - "9096:9094"
    environment:
      <<: *broker-env
      KAFKA_NODE_ID: 3
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-3:9092,PLAINTEXT_HOST://localhost:9096

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui-repl
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
      DYNAMIC_CONFIG_ENABLED: 'true'
    depends_on:
      - kafka-1
      - kafka-2
      - kafka-3
